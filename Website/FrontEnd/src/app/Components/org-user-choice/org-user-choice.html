<section class="OrgOrUser">
    <div class="welcome_hero">
        <div class="welcome_copy">
            <p class="eyebrow">Before we start</p>
            <h1 class="welcome_headline">Who are you joining as?</h1>
            <p class="subtitle">Choose how you'd like to use Sadaka.</p>

            <div class="choice_cards">
                <a class="choice_card choice_card--user" href="#">
                    <div class="choice_icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"
                            stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="8" r="4" /><path
                                d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
                        </svg>
                    </div>
                    <span class="choice_label">Individual</span>
                    <p class="choice_desc">I'm donating or engaging on my own
                        behalf.</p>
                    <button class="cta cta--secondary">Continue as User</button>
                </a>

                <a class="choice_card choice_card--org" href="#">
                    <div class="choice_icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="10" width="18" height="11"
                                rx="2" /><path
                                d="M8 10V7a4 4 0 0 1 8 0v3" /><circle cx="12"
                                cy="15" r="1.5" />
                        </svg>
                    </div>
                    <span class="choice_label">Organisation</span>
                    <p class="choice_desc">I'm representing a charity, company,
                        or group.</p>
                    <button class="cta cta--primary">Continue as Org</button>
                </a>
            </div>
        </div>
    </div>
</section>
